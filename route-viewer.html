<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Route Viewer</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Source+Code+Pro:wght@400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8c84a;
    --red: #e84a4a;
    --green: #4ae87a;
    --text: #f0f0f0;
    --text-dim: #555;
    --text-mid: #888;
    --mono: 'Source Code Pro', monospace;
    --ui: 'Inter', sans-serif;
    --glass: rgba(10,10,10,0.82);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--ui); overflow: hidden; }

  #map { position: absolute; inset: 0; }

  /* TOP BAR */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--glass); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); z-index: 20;
  }

  .logo {
    font-weight: 700; font-size: 14px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--accent);
    white-space: nowrap; flex-shrink: 0;
  }

  .session-title {
    font-size: 11px; color: var(--text-mid); letter-spacing: 1px;
    flex: 1; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; min-width: 0;
  }

  .load-btn {
    background: var(--accent); color: #000; border: none;
    border-radius: 6px; font-family: var(--ui); font-size: 11px;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }

  /* STATS */
  .stats {
    position: absolute; top: 58px; left: 14px;
    background: var(--glass); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; display: none; gap: 14px; z-index: 10;
  }
  .stats.visible { display: flex; }
  .stat { text-align: center; }
  .stat-val { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 8px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

  /* FLOATING MENU */
  .fab { position: absolute; top: 58px; right: 14px; z-index: 20; display: none; flex-direction: column; align-items: flex-end; gap: 6px; }
  .fab.visible { display: flex; }

  .fab-toggle {
    background: var(--glass); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--accent); font-family: var(--ui); font-size: 11px;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 8px 14px; cursor: pointer; white-space: nowrap;
  }

  .fab-menu {
    background: var(--glass); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; display: none; flex-direction: column; min-width: 155px;
  }
  .fab-menu.open { display: flex; }

  .fab-item {
    background: none; border: none; border-bottom: 1px solid var(--border);
    color: var(--text-mid); font-family: var(--ui); font-size: 11px;
    font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    padding: 12px 16px; cursor: pointer; text-align: left;
    transition: color 0.15s, background 0.15s; white-space: nowrap;
  }
  .fab-item:last-child { border-bottom: none; }
  .fab-item:hover { color: var(--accent); background: rgba(232,200,74,0.05); }
  .fab-item.active { color: var(--accent); }

  /* BOTTOM PANEL */
  .bottom-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--glass); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border); z-index: 20;
    display: none; flex-direction: column;
  }
  .bottom-panel.visible { display: flex; }

  .elevation-wrap { position: relative; height: 90px; }
  #elevationCanvas { width: 100%; height: 100%; display: block; }
  .elevation-label { position: absolute; top: 6px; left: 12px; font-size: 8px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .progress-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); opacity: 0.9; pointer-events: none; display: none; }

  .scrubber-wrap { padding: 6px 16px 2px; }
  .scrubber {
    -webkit-appearance: none; width: 100%; height: 3px;
    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  .scrubber::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid #000;
  }

  .controls-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 8px 14px 16px; flex-wrap: wrap;
  }

  .play-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 15px; width: 38px; height: 38px;
    border-radius: 50%; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
  }
  .play-btn:hover { border-color: var(--accent); color: var(--accent); }
  .play-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .speed-wrap { display: flex; align-items: center; gap: 6px; flex: 1; max-width: 180px; }
  .speed-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
  .speed-val { font-family: var(--mono); font-size: 11px; color: var(--accent); white-space: nowrap; flex-shrink: 0; width: 26px; text-align: right; }
  .speed-slider {
    -webkit-appearance: none; flex: 1; height: 3px;
    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid #000;
  }

  .flythrough-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-mid);
    font-family: var(--ui); font-size: 10px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; padding: 8px 12px; border-radius: 6px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
  }
  .flythrough-btn:hover { border-color: var(--accent); color: var(--accent); }
  .flythrough-btn:disabled { opacity: 0.3; cursor: default; }

  /* DROP ZONE */
  .drop-zone {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    background: var(--bg); z-index: 30;
  }
  .drop-zone.hidden { display: none; }
  .drop-icon { font-size: 56px; opacity: 0.15; }
  .drop-title { font-size: 20px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text); }
  .drop-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; text-align: center; padding: 0 40px; }
  .drop-area {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 28px 40px; text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .drop-area:hover, .drop-area.dragover { border-color: var(--accent); background: rgba(232,200,74,0.05); }
  .drop-area-text { font-size: 12px; color: var(--text-mid); margin-bottom: 12px; }
  #fileInput { display: none; }
</style>
</head>
<body>

<div id="map"></div>

<div class="drop-zone" id="dropZone">
  <div class="drop-icon">◎</div>
  <div class="drop-title">Route Viewer</div>
  <div class="drop-sub">Load a TrackLog CSV to visualize your route in 3D</div>
  <div class="drop-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
    <div class="drop-area-text">Drop CSV here or tap to browse</div>
    <button class="load-btn" style="pointer-events:none;">Select File</button>
  </div>
</div>

<div class="topbar">
  <div class="logo">⊕ Route</div>
  <div class="session-title" id="sessionTitle">No route loaded</div>
  <button class="load-btn" onclick="document.getElementById('fileInput').click()">↑ Load CSV</button>
  <input type="file" id="fileInput" accept=".csv" onchange="loadCSV(event)">
</div>

<div class="stats" id="statsOverlay">
  <div class="stat"><div class="stat-val" id="statPoints">—</div><div class="stat-label">Pts</div></div>
  <div class="stat"><div class="stat-val" id="statDist">—</div><div class="stat-label">km</div></div>
  <div class="stat"><div class="stat-val" id="statDuration">—</div><div class="stat-label">Time</div></div>
  <div class="stat"><div class="stat-val" id="statMaxAlt">—</div><div class="stat-label">Max m</div></div>
  <div class="stat"><div class="stat-val" id="statMaxSpd">—</div><div class="stat-label">km/h</div></div>
</div>

<div class="fab" id="fab">
  <button class="fab-toggle" onclick="toggleFabMenu()">⋮ Map</button>
  <div class="fab-menu" id="fabMenu">
    <button class="fab-item active" id="btnSatellite" onclick="setMapStyle('satellite')">🛰 Satellite</button>
    <button class="fab-item" id="btnTerrain" onclick="setMapStyle('terrain')">🗺 Terrain</button>
    <button class="fab-item" id="btnDark" onclick="setMapStyle('dark')">🌑 Dark</button>
    <button class="fab-item" id="btnNorthLock" onclick="toggleNorthLock()">↑ North Lock</button>
    <button class="fab-item" id="btnReset" onclick="resetView()">⊙ Reset View</button>
  </div>
</div>

<div class="bottom-panel" id="bottomPanel">
  <div class="elevation-wrap">
    <div class="elevation-label">Elevation Profile</div>
    <canvas id="elevationCanvas"></canvas>
    <div class="progress-line" id="progressLine"></div>
  </div>
  <div class="scrubber-wrap">
    <input type="range" class="scrubber" id="scrubber" min="0" max="100" value="0" oninput="onScrub(this.value)">
  </div>
  <div class="controls-row">
    <button class="play-btn" onclick="resetPlayback()" title="Restart">⏮</button>
    <button class="play-btn" id="btnPlay" onclick="togglePlayback()">▶</button>
    <button class="play-btn" onclick="stopPlayback()">■</button>
    <div class="speed-wrap">
      <span class="speed-label">Speed</span>
      <input type="range" class="speed-slider" id="speedSlider" min="1" max="10" value="3" oninput="onSpeedChange(this.value)">
      <span class="speed-val" id="speedVal">3×</span>
    </div>
    <button class="flythrough-btn" id="btnFlythrough" onclick="startFlythrough()">▶ Flythrough</button>
  </div>
</div>

<script>
  let MAPBOX_TOKEN = localStorage.getItem('mapbox_token') || '';
  if (!MAPBOX_TOKEN) {
    MAPBOX_TOKEN = prompt('Enter your Mapbox public token (starts with pk.):\n\nGet one free at mapbox.com — saved locally after this.');
    if (MAPBOX_TOKEN) localStorage.setItem('mapbox_token', MAPBOX_TOKEN.trim());
  }
  mapboxgl.accessToken = MAPBOX_TOKEN ? MAPBOX_TOKEN.trim() : '';

  let map = null;
  let rawPoints = [];
  let points = [];
  let playbackTimer = null;
  let playbackIndex = 0;
  let isPlaying = false;
  let playbackSpeed = 3;
  let currentStyle = 'satellite';
  let northLocked = false;
  let fabOpen = false;
  const TICK_MS = 80;

  const STYLES = {
    satellite: 'mapbox://styles/mapbox/satellite-streets-v12',
    terrain:   'mapbox://styles/mapbox/outdoors-v12',
    dark:      'mapbox://styles/mapbox/dark-v11',
  };

  function initMap(center) {
    if (map) { map.remove(); map = null; }
    map = new mapboxgl.Map({
      container: 'map', style: STYLES[currentStyle],
      center, zoom: 12, pitch: 55, bearing: 0, antialias: true,
    });
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-right');
    map.on('load', () => {
      map.addSource('mapbox-dem', { type: 'raster-dem', url: 'mapbox://mapbox.mapbox-terrain-dem-v1', tileSize: 512, maxzoom: 14 });
      map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
      map.setFog({ color: 'rgba(10,10,10,0.8)', 'high-color': 'rgba(20,20,30,1)', 'horizon-blend': 0.4, 'space-color': 'rgba(5,5,15,1)', 'star-intensity': 0.6 });
      renderRoute();
    });
  }

  function loadCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => parseCSV(e.target.result, file.name);
    reader.readAsText(file);
  }

  function parseCSV(text, filename) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) { alert('CSV appears empty.'); return; }
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    const latIdx  = headers.findIndex(h => h.includes('lat'));
    const lngIdx  = headers.findIndex(h => h.includes('lon') || h.includes('lng'));
    const altIdx  = headers.findIndex(h => h.includes('alt'));
    const spdIdx  = headers.findIndex(h => h.includes('spd') || h.includes('speed'));
    const timeIdx = headers.findIndex(h => h.includes('time'));
    if (latIdx < 0 || lngIdx < 0) { alert('CSV must have latitude and longitude columns.'); return; }

    rawPoints = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 2) continue;
      const lat = parseFloat(cols[latIdx]), lng = parseFloat(cols[lngIdx]);
      if (isNaN(lat) || isNaN(lng)) continue;
      rawPoints.push({ lat, lng, alt: altIdx >= 0 ? (parseFloat(cols[altIdx]) || 0) : 0, spd: spdIdx >= 0 ? (parseFloat(cols[spdIdx]) || 0) : 0, time: timeIdx >= 0 ? cols[timeIdx]?.trim() : null });
    }
    if (rawPoints.length === 0) { alert('No valid points found.'); return; }

    points = interpolate(rawPoints, 5);
    document.getElementById('sessionTitle').textContent = filename.replace('.csv','').replace(/_/g,' ').toUpperCase();
    document.getElementById('dropZone').classList.add('hidden');
    document.getElementById('statsOverlay').classList.add('visible');
    document.getElementById('fab').classList.add('visible');
    document.getElementById('bottomPanel').classList.add('visible');
    document.getElementById('scrubber').max = points.length - 1;
    document.getElementById('scrubber').value = 0;
    updateStats();
    drawElevationProfile();
    const mid = rawPoints[Math.floor(rawPoints.length / 2)];
    initMap([mid.lng, mid.lat]);
  }

  function interpolate(pts, steps) {
    if (pts.length < 2) return pts;
    const result = [];
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(0, i-1)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(pts.length-1, i+2)];
      for (let t = 0; t < steps; t++) {
        const tt = t / steps;
        result.push({ lat: catmull(p0.lat,p1.lat,p2.lat,p3.lat,tt), lng: catmull(p0.lng,p1.lng,p2.lng,p3.lng,tt), alt: lerp(p1.alt,p2.alt,tt), spd: lerp(p1.spd,p2.spd,tt), rawIdx: i });
      }
    }
    result.push({ ...pts[pts.length-1], rawIdx: pts.length-1 });
    return result;
  }

  function catmull(p0,p1,p2,p3,t) { return 0.5*((2*p1)+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t*t+(-p0+3*p1-3*p2+p3)*t*t*t); }
  function lerp(a,b,t) { return a+(b-a)*t; }

  function renderRoute() {
    if (!map || rawPoints.length === 0) return;
    const coords = rawPoints.map(p => [p.lng, p.lat]);
    if (map.getSource('route')) {
      ['route-glow','route-line'].forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
      map.removeSource('route');
    }
    map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
    map.addLayer({ id: 'route-glow', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#e8c84a', 'line-width': 12, 'line-opacity': 0.15, 'line-blur': 6 } });
    map.addLayer({ id: 'route-line', type: 'line', source: 'route', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#e8c84a', 'line-width': 3, 'line-opacity': 0.95 } });
    addMarker(rawPoints[0], '▶', '#4ae87a');
    addMarker(rawPoints[rawPoints.length-1], '■', '#e84a4a');
    const bounds = coords.reduce((b,c) => b.extend(c), new mapboxgl.LngLatBounds(coords[0], coords[0]));
    map.fitBounds(bounds, { padding: { top: 120, bottom: 240, left: 40, right: 60 }, pitch: 55, duration: 1500 });
  }

  function addMarker(point, symbol, color) {
    const el = document.createElement('div');
    el.style.cssText = `width:22px;height:22px;background:${color};border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:bold;box-shadow:0 0 8px ${color}88;`;
    el.textContent = symbol;
    new mapboxgl.Marker({ element: el }).setLngLat([point.lng, point.lat]).addTo(map);
  }

  function updateStats() {
    document.getElementById('statPoints').textContent = rawPoints.length;
    let dist = 0;
    for (let i = 1; i < rawPoints.length; i++) dist += haversine(rawPoints[i-1], rawPoints[i]);
    document.getElementById('statDist').textContent = dist.toFixed(1);
    if (rawPoints[0].time && rawPoints[rawPoints.length-1].time) {
      const ms = Math.abs(new Date(rawPoints[rawPoints.length-1].time) - new Date(rawPoints[0].time));
      const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
      document.getElementById('statDuration').textContent = h > 0 ? `${h}h${m}m` : `${m}m`;
    } else document.getElementById('statDuration').textContent = '—';
    const maxAlt = Math.max(...rawPoints.map(p => p.alt||0));
    const maxSpd = Math.max(...rawPoints.map(p => p.spd||0));
    document.getElementById('statMaxAlt').textContent = maxAlt > 0 ? Math.round(maxAlt) : '—';
    document.getElementById('statMaxSpd').textContent = maxSpd > 0 ? Math.round(maxSpd) : '—';
  }

  function haversine(a,b) {
    const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
    const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  }

  function drawElevationProfile(highlightPct = -1) {
    const canvas = document.getElementById('elevationCanvas');
    const wrap = canvas.parentElement;
    canvas.width = wrap.offsetWidth * window.devicePixelRatio;
    canvas.height = wrap.offsetHeight * window.devicePixelRatio;
    canvas.style.width = wrap.offsetWidth + 'px';
    canvas.style.height = wrap.offsetHeight + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    const W = wrap.offsetWidth, H = wrap.offsetHeight;
    const PAD = { top: 20, bottom: 12, left: 8, right: 8 };
    const alts = rawPoints.map(p => p.alt||0);
    const minAlt = Math.min(...alts), maxAlt = Math.max(...alts), range = maxAlt-minAlt||1;
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, PAD.top, 0, H-PAD.bottom);
    grad.addColorStop(0, 'rgba(232,200,74,0.45)');
    grad.addColorStop(1, 'rgba(232,200,74,0.02)');
    ctx.beginPath();
    rawPoints.forEach((p,i) => {
      const x = PAD.left+(i/(rawPoints.length-1))*(W-PAD.left-PAD.right);
      const y = PAD.top+(1-(p.alt-minAlt)/range)*(H-PAD.top-PAD.bottom);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.lineTo(W-PAD.right, H-PAD.bottom);
    ctx.lineTo(PAD.left, H-PAD.bottom);
    ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath();
    rawPoints.forEach((p,i) => {
      const x = PAD.left+(i/(rawPoints.length-1))*(W-PAD.left-PAD.right);
      const y = PAD.top+(1-(p.alt-minAlt)/range)*(H-PAD.top-PAD.bottom);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.strokeStyle='#e8c84a'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#555'; ctx.font='9px Source Code Pro, monospace'; ctx.textAlign='left';
    ctx.fillText(`${Math.round(maxAlt)}m`, PAD.left+4, PAD.top+2);
    ctx.fillText(`${Math.round(minAlt)}m`, PAD.left+4, H-PAD.bottom-2);
    if (highlightPct >= 0) {
      const x = PAD.left+highlightPct*(W-PAD.left-PAD.right);
      const line = document.getElementById('progressLine');
      line.style.display='block'; line.style.left=x+'px';
    }
  }

  function togglePlayback() { isPlaying ? pausePlayback() : startPlayback(); }

  function startPlayback() {
    if (points.length === 0) return;
    isPlaying = true;
    document.getElementById('btnPlay').classList.add('active');
    document.getElementById('btnPlay').textContent = '⏸';
    ensureMarkerSource();
    const step = () => {
      if (!isPlaying) return;
      if (playbackIndex >= points.length) { stopPlayback(); return; }
      const pt = points[playbackIndex];
      map.getSource('marker-pos').setData({ type:'Feature', geometry:{ type:'Point', coordinates:[pt.lng,pt.lat] } });
      map.easeTo({ center:[pt.lng,pt.lat], duration:TICK_MS+10, easing:t=>t });
      const pct = playbackIndex/(points.length-1);
      document.getElementById('scrubber').value = playbackIndex;
      drawElevationProfile(pct);
      playbackIndex += playbackSpeed;
      playbackTimer = setTimeout(step, TICK_MS);
    };
    step();
  }

  function pausePlayback() {
    isPlaying=false; clearTimeout(playbackTimer);
    document.getElementById('btnPlay').classList.remove('active');
    document.getElementById('btnPlay').textContent='▶';
  }

  function stopPlayback() {
    pausePlayback(); playbackIndex=0;
    document.getElementById('scrubber').value=0;
    document.getElementById('progressLine').style.display='none';
    drawElevationProfile();
  }

  function resetPlayback() { stopPlayback(); resetView(); }

  function onScrub(val) {
    pausePlayback(); playbackIndex=parseInt(val);
    if (points.length===0) return;
    const pt = points[Math.min(playbackIndex, points.length-1)];
    ensureMarkerSource();
    map.getSource('marker-pos').setData({ type:'Feature', geometry:{ type:'Point', coordinates:[pt.lng,pt.lat] } });
    map.easeTo({ center:[pt.lng,pt.lat], duration:200 });
    drawElevationProfile(playbackIndex/(points.length-1));
  }

  function onSpeedChange(val) { playbackSpeed=parseInt(val); document.getElementById('speedVal').textContent=val+'×'; }

  function ensureMarkerSource() {
    if (!map.getSource('marker-pos')) {
      map.addSource('marker-pos', { type:'geojson', data:{ type:'Feature', geometry:{ type:'Point', coordinates:[points[0].lng,points[0].lat] } } });
      map.addLayer({ id:'playback-marker', type:'circle', source:'marker-pos', paint:{ 'circle-radius':8, 'circle-color':'#e8c84a', 'circle-stroke-width':2, 'circle-stroke-color':'#000' } });
    }
  }

  function startFlythrough() {
    if (!map || rawPoints.length===0) return;
    stopPlayback();
    const btn=document.getElementById('btnFlythrough'); btn.disabled=true;
    let i=0;
    const fly = () => {
      if (i>=points.length-1) { btn.disabled=false; return; }
      const curr=[points[i].lng,points[i].lat];
      const next=[points[Math.min(i+8,points.length-1)].lng, points[Math.min(i+8,points.length-1)].lat];
      map.easeTo({ center:curr, bearing:getBearing(curr,next), pitch:70, zoom:15, duration:240, easing:t=>t });
      drawElevationProfile(i/(points.length-1));
      document.getElementById('scrubber').value=i;
      i+=6; playbackTimer=setTimeout(fly, 220);
    };
    map.easeTo({ pitch:70, zoom:14, duration:800 });
    setTimeout(fly, 900);
  }

  function getBearing(from,to) {
    const lat1=from[1]*Math.PI/180, lat2=to[1]*Math.PI/180, dLng=(to[0]-from[0])*Math.PI/180;
    return (Math.atan2(Math.sin(dLng)*Math.cos(lat2), Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng))*180/Math.PI+360)%360;
  }

  function toggleFabMenu() { fabOpen=!fabOpen; document.getElementById('fabMenu').classList.toggle('open',fabOpen); }

  function setMapStyle(style) {
    currentStyle=style;
    ['satellite','terrain','dark'].forEach(s => document.getElementById('btn'+s.charAt(0).toUpperCase()+s.slice(1)).classList.remove('active'));
    document.getElementById('btn'+style.charAt(0).toUpperCase()+style.slice(1)).classList.add('active');
    closeFab();
    if (map) {
      map.setStyle(STYLES[style]);
      map.once('styledata', () => {
        map.addSource('mapbox-dem',{type:'raster-dem',url:'mapbox://mapbox.mapbox-terrain-dem-v1',tileSize:512,maxzoom:14});
        map.setTerrain({source:'mapbox-dem',exaggeration:1.5});
        renderRoute();
      });
    }
  }

  function toggleNorthLock() {
    northLocked=!northLocked;
    const btn=document.getElementById('btnNorthLock');
    if (northLocked) { map.setBearing(0); map.dragRotate.disable(); map.touchZoomRotate.disableRotation(); btn.classList.add('active'); btn.textContent='↑ North Locked'; }
    else { map.dragRotate.enable(); map.touchZoomRotate.enableRotation(); btn.classList.remove('active'); btn.textContent='↑ North Lock'; }
    closeFab();
  }

  function resetView() {
    if (!map||rawPoints.length===0) return;
    const coords=rawPoints.map(p=>[p.lng,p.lat]);
    const bounds=coords.reduce((b,c)=>b.extend(c),new mapboxgl.LngLatBounds(coords[0],coords[0]));
    map.fitBounds(bounds,{padding:{top:120,bottom:240,left:40,right:60},pitch:55,bearing:0,duration:1200});
    closeFab();
  }

  function closeFab() { fabOpen=false; document.getElementById('fabMenu').classList.remove('open'); }

  const dropArea = document.getElementById('dropArea');
  dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
  dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
  dropArea.addEventListener('drop', e => {
    e.preventDefault(); dropArea.classList.remove('dragover');
    const file=e.dataTransfer.files[0];
    if (file?.name.endsWith('.csv')) { const r=new FileReader(); r.onload=ev=>parseCSV(ev.target.result,file.name); r.readAsText(file); }
  });

  document.getElementById('map').addEventListener('click', () => { if (fabOpen) closeFab(); });
  window.addEventListener('resize', () => { if (rawPoints.length>0) drawElevationProfile(); });
</script>
</body>
</html>
